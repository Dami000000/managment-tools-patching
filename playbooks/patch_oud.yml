---
# ============================================================
# OUD Patch Playbook
# ============================================================
# Usage:
#   Patch all OUD hosts (default):
#     ansible-playbook -i inventory/dev/hosts playbooks/patch_oud.yml
#
#   Patch specific location:
#     ansible-playbook -i inventory/dev/hosts playbooks/patch_oud.yml -e "target=oud_ap1"
#     ansible-playbook -i inventory/dev/hosts playbooks/patch_oud.yml -e "target=oud_ap2"
#
#   Patch specific server:
#     ansible-playbook -i inventory/dev/hosts playbooks/patch_oud.yml -e "target=oud1.ap1.dev.ccn2.taxud"
#
#   Patch on FAT environment:
#     ansible-playbook -i inventory/fat/hosts playbooks/patch_oud.yml -e "target=oud_ap1"
#
#   Override serial (default: 1 host at a time):
#     ansible-playbook -i inventory/dev/hosts playbooks/patch_oud.yml -e "serial=2"
#
# Default: runs on ALL OUD hosts, 1 host at a time
# ============================================================

- name: OUD Patching
  hosts: "{{ target | default('oud') }}"
  serial: "{{ serial | default(1) }}"
  become: yes
  become_user: "{{ oracle_user }}"
  vars_files:
    - ../group_vars/vars.yml

  tasks:
    - name: Stop OUD services
      include_tasks: ../roles/stop_cots/stop_oud/tasks/stop_oud.yml
      tags: [stop, cots]

    - name: Backup OUD
      include_tasks: ../roles/backup/backup_oud/tasks/backup_oud.yml
      tags: [backup]

    - name: Install/Update JDK
      include_tasks: ../roles/jdk/tasks/jdk_install.yml
      tags: [jdk]

    - name: Install/Update OPatch for OUD
      include_tasks: ../roles/opatch_install/tasks/opatch_install_oud.yml
      tags: [opatch]

    - name: Apply OUD patches
      include_tasks: ../roles/patch/oud_patch_install/tasks/oud_install.yml
      tags: [patch]

    - name: Start OUD services
      include_tasks: ../roles/start_cots/start_oud/tasks/start_oud.yml
      tags: [start, cots]
