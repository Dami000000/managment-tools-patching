---
- name: Shutdown OAM Managed Server - node1
  shell: 
    # cmd: "nohup ./stopManagedWebLogic.sh wls_oam1 {{ oam_admin_url_ap1 }} &"
    cmd: "./stopManagedWebLogic.sh wls_oam1 {{ oam_admin_url_ap1 }} weblogic qX8yA_7e9ZgWjDvP"
    chdir: "managed_server_domain/bin"
  register: stopManagedServer_out
  # delegate_to: "groups['oam_dev_ap1'] | oam1.ap1.dev.ccn2.taxud }}"
  when: inventory_hostname == 'oam1.ap1.dev.ccn2.taxud'
- debug: 
     var: stopManagedServer_out.stdout_lines

- name: Shutdown OAM Managed Server - node2
  shell: 
    cmd: "./stopManagedWebLogic.sh wls_oam2 {{ oam_admin_url_ap1 }} weblogic qX8yA_7e9ZgWjDvP"
    chdir: "{{ managed_server_domain }}/bin"
  register: stopManagedServer2_out
  when: inventory_hostname == 'oam2.ap1.dev.ccn2.taxud'
- debug: 
    var: stopManagedServer2_out.stdout_lines

- name: Shutdown OAM Admin Servers 
  shell:
    cmd: "./stopWebLogic.sh"
    chdir: "{{ admin_server_domain }}/bin"
  register: stopAdminServer_out
  when: inventory_hostname == 'oam1.ap1.dev.ccn2.taxud'
- debug: 
    var: stopAdminServer_out.stdout_lines

- name: Shutdown OAM NodeManager
  shell:
    cmd: "./stopNodeManager.sh"
    chdir: "{{ managed_server_domain }}/bin"
  register: stopNodeManager_out
- debug: 
    var: stopNodeManager_out.stdout_lines