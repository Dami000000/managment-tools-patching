---
- name: Check OIG Node Manager process
  shell: "pgrep -f 'startNodeManager'"
  register: nodemanager_process_check
  ignore_errors: yes
  changed_when: False
  failed_when: False

- name: Check OIG Managed server process - OIG
  shell: "pgrep -f '{{ oig_managed_server_domain }}/config/fmwconfig/servers/wls_oim'"
  register: managed_process_check
  ignore_errors: yes
  changed_when: False
  failed_when: False

- name: Check OIG Managed server process - SOA
  shell: "pgrep -f '{{ oig_managed_server_domain }}/config/fmwconfig/servers/wls_soa'"
  register: soa_process_check
  ignore_errors: yes
  changed_when: False
  failed_when: False

- name: Check OIG Admin Server process
  shell: "pgrep -f '{{ oig_admin_server_domain }}/bin/startWebLogic.sh'"
  register: admin_process_check
  ignore_errors: yes
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
  changed_when: False
  failed_when: False

- name: Copy stop_oig_managed_servers.py to target
  template:
    src: ../templates/stop_oig_managed_servers.py
    dest: /tmp/stop_oig_managed_servers.py
    owner: "{{ oracle_user }}"
    mode: '0755'
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
    - managed_process_check.rc == 0

- name: Copy stop_soa_managed_servers.py to target
  template:
    src: ../templates/stop_soa_managed_servers.py
    dest: /tmp/stop_soa_managed_servers.py
    owner: "{{ oracle_user }}"
    mode: '0755'
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
    - soa_process_check.rc == 0

- name: Shutdown OIG Managed Servers (force)
  shell:
    cmd: "{{ oracle_home_oig }}/oracle_common/common/bin/wlst.sh /tmp/stop_oig_managed_servers.py"
  register: stopManagedServer_out
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
    - managed_process_check.rc == 0

- debug:
    var: stopManagedServer_out.stdout_lines
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Shutdown OIG SOA Servers (force)
  shell:
    cmd: "{{ oracle_home_oig }}/oracle_common/common/bin/wlst.sh /tmp/stop_soa_managed_servers.py"
  register: stopSoaServer_out
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
    - soa_process_check.rc == 0

- debug:
    var: stopSoaServer_out.stdout_lines
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Shutdown OIG Admin Server
  shell:
    cmd: "./stopWebLogic.sh"
    chdir: "{{ oig_admin_server_domain }}/bin"
  register: stopAdminServer_out
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
    - admin_process_check.rc == 0

- debug:
    var: stopAdminServer_out.stdout_lines
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Shutdown OIG NodeManager
  shell:
    cmd: "./stopNodeManager.sh"
    chdir: "{{ oig_managed_server_domain }}/bin"
  register: stopNodeManager_out
  when:
    - nodemanager_process_check.rc == 0

- debug:
    var: stopNodeManager_out.stdout_lines
