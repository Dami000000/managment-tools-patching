---
- name: Upload DBclient_archive {{ DBclient_archive }}
  copy:
    src: /app/binaries/OHS/{{ DBclient_archive }}
    dest: "{{ binaries_dir }}/{{ DBclient_archive }}"

- name: Unzip Patch DBclient
  unarchive:
    src: "{{ binaries_dir }}/{{ DBclient_archive }}"
    dest: "{{ binaries_dir }}"
    remote_src: yes
    list_files: true
  register: zip_content

- set_fact:
    dbclient_patch_id: "{{ zip_content.files[0][:-1] }}"

- name: Execute ChangePerm script 
  shell: 
    cmd: "./changePerm.sh {{ oracle_home }}"
    chdir: "{{ binaries_dir }}/{{ dbclient_patch_id }}"
  register: changePerm_out
- debug:
    var: changePerm_out.stdout_lines

- name: "Apply patch DBclient"
  shell:
    cmd: "./fmw_12.2.1.19.0_dbclient_linux64.bin -invPtrLoc ${ORACLE_HOME}/oraInst.loc -silent ORACLE_HOME=${ORACLE_HOME}"
    chdir: "{{ binaries_dir }}/{{ dbclient_patch_id }}/"
  register: patch_apply_out
  environment:
    JAVA_HOME: /app/jdk
    ORACLE_HOME: "{{ oracle_home }}"
    PATH: "/usr/lib64/qt-3.3/bin:/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:/home/oracle/.local/bin:/home/oracle/bin:/usr/sbin:/app/jdk/bin:/app/scripts"

- debug:
    var: patch_apply_out.stdout_lines