- name: Shutdown OAM Admin Servers 
  shell:
    cmd: "./stopWebLogic.sh"
    chdir: "{{ oam_admin_server_domain }}/bin"
  register: stopAdminServer_out
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'
    - admin_process_check.rc == 0
- debug: 
    var: stopAdminServer_out.stdout_lines
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'
    - admin_process_check.rc == 0

- name: Shutdown OAM NodeManager
  shell:
    cmd: "./stopNodeManager.sh"
    chdir: "{{ oam_managed_server_domain }}/bin"
  register: stopNodeManager_out
- debug: 
    var: stopNodeManager_out.stdout_lines

- name: "Apply patch"
  shell:
    cmd: "{{ opatch_home_oam }}/opatch apply -silent"
    chdir: "{{ binaries_dir }}/{{ patch_id }}"
  register: opatch_apply_out

- debug: 
    var: opatch_apply_out.stdout_lines

- name: Start OAM NodeManager
  shell:
    cmd: "nohup ./startNodeManager.sh &"
    chdir: "{{ oam_managed_server_domain }}/bin"
  register: startNodeManager_out
- debug: 
     var: startNodeManager_out.stdout_lines 

- name: Check OAM Managed server process
  shell: "pgrep -f '/IAMAccessDomain/config/fmwconfig/servers/wls_'"
  register: managed_process_check
  ignore_errors: yes

- name: Check OAM Admin Server process
  shell: "pgrep -f '/mnt/nfs/config/aserver/domains/IAMAccessDomain/bin/startWebLogic.sh'"
  register: admin_process_check
  ignore_errors: yes
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'

- name: Start OAM Admin Server
  shell:
    cmd: 'nohup {{ oam_admin_server_domain }}/bin/startWebLogic.sh </dev/null >"{{ oam_admin_server_domain }}/servers/AdminServer/logs/AdminServer.out" 2>&1 &'
  # register: startOAMAdminServer_out
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'
    # - admin_process_check.rc != 0
# - debug: 
#     var: startOAMAdminServer_out.stdout_lines
#   when: inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'

- name: Wait for OAM Admin Server to Start
  wait_for:
    host: oam-{{ ap }}-intvip.bck.{{ env }}.ccn2.taxud
    port: 7001
    delay: 10
    timeout: 300
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'
    # - admin_process_check.rc != 0
  



