---
- name: Upload patch patch_archive
  copy:
    src: templates/{{ patch_archive }}
    dest: "{{ binaries_dir }}/{{ patch_archive }}"

- name: Unzip Patch
  unarchive:
    src: "{{ binaries_dir }}/{{ patch_archive }}"
    dest: "{{ binaries_dir }}"
    remote_src: yes
    list_files: true
  register: zip_content

# - debug:
#     var: zip_content.files[0][:-1]

# - set_fact:
#     patch_id: "{{ zip_content.files[0][:-1] }}"

# - name: Write out directory name
#   debug:
#     msg: "{{ patch_id }}"

- name: Check OAM Managed server process
  shell: "pgrep -f '/IAMAccessDomain/config/fmwconfig/servers/wls_'"
  register: managed_process_check
  ignore_errors: yes

- name: Check OAM Admin Server process
  shell: "pgrep -f '/mnt/nfs/config/aserver/domains/IAMAccessDomain/bin/startWebLogic.sh'"
  register: admin_process_check
  ignore_errors: yes
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'

- name: Shutdown OAM Managed Server - wls_oam1
  shell: 
    cmd: "./stopManagedWebLogic.sh wls_oam1 {{ oam_admin_url }} weblogic qX8yA_7e9ZgWjDvP"
    chdir: "{{ oam_managed_server_domain }}/bin"
  register: stopManagedServer_out
  # delegate_to: "groups['oam_dev_ap1'][0]"
#  when: inventory_hostname == 'oam1.ap1.dev.ccn2.taxud'
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'
    - managed_process_check.rc == 0
- debug: 
     var: stopManagedServer_out.stdout_lines
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'
    - managed_process_check.rc == 0

- name: Shutdown OAM Managed Server - wls_oam2
  shell: 
    cmd: "./stopManagedWebLogic.sh wls_oam2 {{ oam_admin_url }} weblogic qX8yA_7e9ZgWjDvP"
    chdir: "{{ oam_managed_server_domain }}/bin"
  register: stopManagedServer2_out
  #when: inventory_hostname == 'oam2.ap1.dev.ccn2.taxud'
  when: 
    - inventory_hostname == 'oam2.{{ ap }}.{{ env }}.ccn2.taxud'
    - managed_process_check.rc == 0
- debug: 
    var: stopManagedServer2_out.stdout_lines
  when: 
    - inventory_hostname == 'oam2.{{ ap }}.{{ env }}.ccn2.taxud'
    - managed_process_check.rc == 0


- name: Shutdown OAM Managed Server - wls_ama1
  shell: 
    cmd: "./stopManagedWebLogic.sh wls_ama1 {{ oam_admin_url }} weblogic qX8yA_7e9ZgWjDvP"
    chdir: "{{ oam_managed_server_domain }}/bin"
  register: stopManagedServer_out
  # delegate_to: "groups['oam_dev_ap1'][0]"
  #when: inventory_hostname == 'oam1.ap1.dev.ccn2.taxud'
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'
    - managed_process_check.rc == 0
- debug: 
     var: stopManagedServer_out.stdout_lines
  when: 
    - inventory_hostname == 'oam1.{{ ap }}.{{ env }}.ccn2.taxud'
    - managed_process_check.rc == 0

- name: Shutdown OAM Managed Server - wls_ama2
  shell: 
    cmd: "./stopManagedWebLogic.sh wls_ama2 {{ oam_admin_url }} weblogic qX8yA_7e9ZgWjDvP"
    chdir: "{{ oam_managed_server_domain }}/bin"
  register: stopManagedServer2_out
  #when: inventory_hostname == 'oam2.ap1.dev.ccn2.taxud'
  when: 
