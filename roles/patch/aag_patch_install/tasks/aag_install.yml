---
- name: Delete {{ binaries_dir }} directory contents
  file:
    path: "{{ binaries_dir }}"
    state: absent

- name: Recreate {{ binaries_dir }} directory
  file:
    path: "{{ binaries_dir }}"
    state: directory

- name: Upload patch {{ aag_patch_archive }}
  copy:
    src: "{{ patches_dir_aag }}/{{ aag_patch_archive }}"
    dest: "{{ binaries_dir }}/{{ aag_patch_archive }}"

- name: Import Axway code signing PGP key
  shell: gpg --import axwaypgp.asc
  args:
    chdir: "{{ binaries_dir }}"

- name: Verify the PGP signature
  shell: gpg --verify installer.tar.gz.asc {{ aag_patch_archive }}
  args:
    chdir: "{{ binaries_dir }}"
  register: verify_output
  until: verify_output.stdout.find('Good signature') != -1
  retries: 2
  delay: 10
  failed_when: verify_output.stdout.find('Good signature') == -1

- name: Unzip patch {{ aag_patch_archive }}
  unarchive:
    src: "{{ binaries_dir }}/{{ aag_patch_archive }}"
    dest: "{{ binaries_dir }}"
    remote_src: yes
    list_files: true
  register: zip_content

- name: Apply AAG patch
  shell:
    cmd: "./update_apigw.sh --install_dir /app/Axway-7.7.0/apigateway --no_backup --mode unattended"
    chdir: "{{ binaries_dir }}"
  register: patch_apply_out

- debug:
    var: patch_apply_out.stdout_lines

- name: Verify that patch has been installed correctly
  shell:
    cmd: "./managedomain --version"
    chdir: /app/Axway-7.7.0/apigateway/posix/bin
  register: managedomain_version

- debug:
    var: managedomain_version.stdout_lines

- name: Delete {{ binaries_dir }} directory contents after install
  file:
    path: "{{ binaries_dir }}"
    state: absent
