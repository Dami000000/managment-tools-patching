---
# ============================================================
# OSB Patch Rollback
# Rolls back patches listed in osb_patches_rollback (vars.yml)
# If osb_patches_rollback is empty ([]) this task is skipped
# ============================================================

- name: Check if there are OSB patches to rollback
  debug:
    msg: "Patches to rollback: {{ osb_patches_rollback }}"
  when: osb_patches_rollback | length > 0

- name: Skip rollback - no patches defined in osb_patches_rollback
  debug:
    msg: "No patches to rollback for OSB. Skipping."
  when: osb_patches_rollback | length == 0

- name: Rollback OSB patch {{ item.patch_id }}
  shell:
    cmd: "{{ opatch_home_osb }}/opatch rollback -id {{ item.patch_id }} -silent -oh {{ oracle_home_osb }}"
  register: opatch_rollback_out
  with_items: "{{ osb_patches_rollback }}"
  when: osb_patches_rollback | length > 0
  ignore_errors: no

- name: Display rollback result
  debug:
    var: opatch_rollback_out
  when: osb_patches_rollback | length > 0

- name: Verify rolled back patches are no longer installed
  shell:
    cmd: "{{ opatch_home_osb }}/opatch lsinventory | grep -c '{{ item.patch_id }}' || true"
  register: patch_check
  with_items: "{{ osb_patches_rollback }}"
  when: osb_patches_rollback | length > 0

- name: Confirm patch {{ item.item.patch_id }} successfully removed
  debug:
    msg: "Patch {{ item.item.patch_id }} successfully rolled back."
  with_items: "{{ patch_check.results }}"
  when:
    - osb_patches_rollback | length > 0
    - item.stdout == "0"
