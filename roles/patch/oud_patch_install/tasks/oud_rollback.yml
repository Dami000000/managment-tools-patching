---
# ============================================================
# OUD Patch Rollback
# Rolls back patches listed in oud_patches_rollback (vars.yml)
# If oud_patches_rollback is empty ([]) this task is skipped
# ============================================================

- name: Check if there are OUD patches to rollback
  debug:
    msg: "Patches to rollback: {{ oud_patches_rollback }}"
  when: oud_patches_rollback | length > 0

- name: Skip rollback - no patches defined in oud_patches_rollback
  debug:
    msg: "No patches to rollback for OUD. Skipping."
  when: oud_patches_rollback | length == 0

- name: Rollback OUD patch {{ item.patch_id }}
  shell:
    cmd: "{{ opatch_home_oud }}/opatch rollback -id {{ item.patch_id }} -silent -oh {{ oracle_home_oud }}"
  register: opatch_rollback_out
  with_items: "{{ oud_patches_rollback }}"
  when: oud_patches_rollback | length > 0
  ignore_errors: no

- name: Display rollback result
  debug:
    var: opatch_rollback_out
  when: oud_patches_rollback | length > 0

- name: Verify rolled back patches are no longer installed
  shell:
    cmd: "{{ opatch_home_oud }}/opatch lsinventory | grep -c '{{ item.patch_id }}' || true"
  register: patch_check
  with_items: "{{ oud_patches_rollback }}"
  when: oud_patches_rollback | length > 0

- name: Confirm patch {{ item.item.patch_id }} successfully removed
  debug:
    msg: "Patch {{ item.item.patch_id }} successfully rolled back."
  with_items: "{{ patch_check.results }}"
  when:
    - oud_patches_rollback | length > 0
    - item.stdout == "0"
