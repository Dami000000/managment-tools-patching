---
# ============================================================
# OUD Patch Install
# Before applying patches, rollback is performed if
# oud_patches_rollback list is defined and not empty in vars.yml
# ============================================================

- name: Upload patch {{ item.patch_archive }}
  copy:
    src: "{{ patches_dir_oud }}/{{ item.patch_archive }}"
    dest: "{{ binaries_dir }}/{{ item.patch_archive }}"
  with_items: "{{ oud_patches_to_apply }}"

- name: Unzip Patch
  unarchive:
    src: "{{ binaries_dir }}/{{ item.patch_archive }}"
    dest: "{{ binaries_dir }}"
    remote_src: yes
    list_files: true
  with_items: "{{ oud_patches_to_apply }}"
  register: zip_content

- name: Rollback conflicting OUD patches before install
  include_tasks: oud_rollback.yml
  tags: [rollback]

- name: Apply patch
  shell:
    cmd: "{{ opatch_home_oud }}/opatch apply -silent"
    chdir: "{{ binaries_dir }}/{{ item.patch_id }}/"
  register: opatch_apply_out
  with_items: "{{ oud_patches_id }}"

- debug:
    var: opatch_apply_out.results
