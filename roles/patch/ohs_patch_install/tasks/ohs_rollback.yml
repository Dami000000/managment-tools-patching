---
# ============================================================
# OHS Patch Rollback
# Rolls back patches listed in ohs_patches_rollback (vars.yml)
# If ohs_patches_rollback is empty ([]) this task is skipped
# Checks lsinventory first - skips if patch not installed
# ============================================================

- name: Skip rollback - no patches defined in ohs_patches_rollback
  debug:
    msg: "No patches to rollback for OHS. Skipping."
  when: ohs_patches_rollback | length == 0

- name: Check if OHS patch {{ item.patch_id }} is installed
  shell:
    cmd: "{{ opatch_home_ohs }}/opatch lsinventory | grep -c '{{ item.patch_id }}' || true"
  register: ohs_patch_installed
  with_items: "{{ ohs_patches_rollback }}"
  when: ohs_patches_rollback | length > 0
  changed_when: false

- name: Rollback OHS patch {{ item.item.patch_id }}
  shell:
    cmd: "{{ opatch_home_ohs }}/opatch rollback -id {{ item.item.patch_id }} -silent -oh {{ oracle_home_ohs }}"
  register: opatch_rollback_out
  with_items: "{{ ohs_patch_installed.results }}"
  when:
    - ohs_patches_rollback | length > 0
    - item.stdout | int > 0

- name: Patch {{ item.item.patch_id }} not installed - skipping rollback
  debug:
    msg: "Patch {{ item.item.patch_id }} not found in Oracle Home - skipping rollback."
  with_items: "{{ ohs_patch_installed.results }}"
  when:
    - ohs_patches_rollback | length > 0
    - item.stdout | int == 0

- name: Display rollback result
  debug:
    var: opatch_rollback_out
  when: ohs_patches_rollback | length > 0
