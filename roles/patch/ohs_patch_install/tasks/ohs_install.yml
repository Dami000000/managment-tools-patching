---
- name: Upload patch {{ item.patch_archive }}
  copy:
    src: "{{ patches_dir_ohs }}/{{ item.patch_archive }}"
    dest: "{{ binaries_dir }}/{{ item.patch_archive }}"
  with_items: "{{ ohs_patches_to_apply }}"

- name: Unzip Patch
  unarchive:
    src: "{{ binaries_dir }}/{{ item.patch_archive }}"
    dest: "{{ binaries_dir }}"
    remote_src: yes
    list_files: true
  with_items: "{{ ohs_patches_to_apply }}"
  register: zip_content

- name: Apply patch
  shell:
    cmd: "{{ opatch_home_ohs }}/opatch apply -silent"
    chdir: "{{ binaries_dir }}/{{ item.patch_id }}/"
  register: opatch_apply_out
  with_items: "{{ ohs_patches_id }}"

- debug:
    var: opatch_apply_out.stdout_lines
