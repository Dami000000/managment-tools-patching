---
- name: Check OIG Node Manager process
  shell: "pgrep -f 'startNodeManager'"
  register: nodemanager_process_check
  ignore_errors: yes
  changed_when: False
  failed_when: False

- name: Check OIG Admin Server process
  shell: "pgrep -f 'IAMGovernanceDomain12c'"
  register: admin_process_check
  ignore_errors: yes
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
  changed_when: False
  failed_when: False

- name: Start OIG NodeManager
  shell:
    cmd: "nohup ./startNodeManager.sh &"
    chdir: "{{ oig_managed_server_domain }}/bin"
  register: startNodeManager_out
  when:
    - nodemanager_process_check.rc != 0

- debug:
    var: startNodeManager_out.stdout_lines
  when:
    - nodemanager_process_check.rc != 0

- name: Copy start_soa_managed_servers.py to target
  template:
    src: ../templates/start_soa_managed_servers.py
    dest: /tmp/start_soa_managed_servers.py
    owner: "{{ oracle_user }}"
    mode: '0755'
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Copy start_oig_managed_servers.py to target
  template:
    src: ../templates/start_oig_managed_servers.py
    dest: /tmp/start_oig_managed_servers.py
    owner: "{{ oracle_user }}"
    mode: '0755'
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Start OIG Admin Server
  shell:
    cmd: 'nohup {{ oig_admin_server_domain }}/bin/startWebLogic.sh </dev/null >"{{ oig_admin_server_domain }}/servers/AdminServer/logs/AdminServer.out" 2>&1 &'
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
    - admin_process_check.rc != 0

- name: Wait for OIG Admin Server to Start
  wait_for:
    host: "oim-{{ ap }}-intvip.bck.{{ env }}.ccn2.taxud"
    port: "{{ oig_admin_server_port }}"
    delay: 10
    timeout: 900
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Start SOA Managed Servers
  shell:
    cmd: "{{ oracle_home_oig }}/oracle_common/common/bin/wlst.sh /tmp/start_soa_managed_servers.py"
  register: startSOA_output
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- debug:
    var: startSOA_output.stdout_lines
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Wait for SOA Managed Servers to Start
  wait_for:
    host: "{{ item }}"
    port: "{{ oig_soa_port }}"
    delay: 10
    timeout: 600
  loop:
    - "oim1-{{ ap }}-soavip.bck.{{ env }}.ccn2.taxud"
    - "oim2-{{ ap }}-soavip.bck.{{ env }}.ccn2.taxud"
  register: wait_soa_result
  ignore_errors: true
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Start OIG Managed Servers
  shell:
    cmd: "{{ oracle_home_oig }}/oracle_common/common/bin/wlst.sh /tmp/start_oig_managed_servers.py"
  register: start_oig_output
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- debug:
    var: start_oig_output.stdout_lines
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Wait for OIG Managed Servers to Start
  wait_for:
    host: "{{ item }}"
    port: "{{ oig_managed_server_port }}"
    delay: 10
    timeout: 600
  loop:
    - "oim1-{{ ap }}-oimvip.bck.{{ env }}.ccn2.taxud"
    - "oim2-{{ ap }}-oimvip.bck.{{ env }}.ccn2.taxud"
  register: wait_oig_result
  ignore_errors: true
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'

- name: Ensure all OIG servers are up
  fail:
    msg: "One or more OIG managed servers failed to start. Check logs on target host."
  when:
    - inventory_hostname == 'oim1.' + ap + '.' + env + '.ccn2.taxud'
    - wait_oig_result.results | selectattr('failed', 'eq', true) | list | length > 0
