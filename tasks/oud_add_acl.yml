- name: Add ACL for Anonymous control access - 1.2.840.113556.1.4.319
  lineinfile: 
    path: /app/ldap_instance/OUD/config/config.ldif
    regexp: '.*Anonymous control access.*'
    line: 'ds-cfg-global-aci: (targetcontrol="2.16.840.1.113730.3.4.2 || 2.16.840.1.113730.3.4.17 || 2.16.840.1.113730.3.4.19 || 1.3.6.1.4.1.4203.1.10.2 || 1.3.6.1.4.1.42.2.27.8.5.1 || 2.16.840.1.113730.3.4.16 || 2.16.840.1.113894.1.8.31 || 1.2.840.113556.1.4.319") (version 3.0; acl "Anonymous control access"; allow(read) userdn="ldap:///anyone";)'
    

