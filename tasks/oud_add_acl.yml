 ############################################     
##1

- name: Add lastExternalChangelogCookie 
  lineinfile: 
    path: /app/ldap_instance/OUD/config/config.ldif
    line: 'ds-cfg-global-aci: (target="ldap:///")(targetscope="base")(targetattr="lastExternalChangelogCookie")(version 3.0; acl "User-Visible lastExternalChangelog"; allow (read,search,compare) groupdn="ldap:///cn=OIMAdministrators,cn=roles,cn=security,dc=ccn2,dc=eu";)'
    insertafter: '.*Anonymous extended operation access.*'

- name: Edit External changelog access from deny to allow
  lineinfile: 
    path: /app/ldap_instance/OUD/config/config.ldif
    regexp: '.*External changelog access.*'
    line: 'ds-cfg-global-aci: (target="ldap:///cn=changelog")(targetattr="*")(version 3.0; acl "External changelog access"; allow (read,search,compare,add,write,delete,export) groupdn="ldap:///cn=OIMAdministrators,cn=roles,cn=security,dc=ccn2,dc=eu";)'

- name: Edit ACL for Authenticated users control access - Add 1.3.6.1.4.1.26027.1.5.4 &  1.3.6.1.4.1.26027.2.3.4
  lineinfile: 
    path: /app/ldap_instance/OUD/config/config.ldif
    regexp: '.*Authenticated users control access.*'
    line: 'ds-cfg-global-aci: (targetcontrol="1.3.6.1.1.12 || 1.3.6.1.1.13.1 || 1.3.6.1.1.13.2 || 1.2.826.0.1.3344810.2.3 || 2.16.840.1.113730.3.4.18 || 2.16.840.1.113730.3.4.9 || 1.2.840.113556.1.4.473 || 1.3.6.1.4.1.42.2.27.9.5.9 || 1.3.6.1.4.1.26027.1.5.4 || 1.3.6.1.4.1.26027.2.3.4") (version 3.0; acl "Authenticated users control access"; allow(read) userdn="ldap:///all";)'

